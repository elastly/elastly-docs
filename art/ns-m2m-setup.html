<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"><link rel="stylesheet" href="_mock.css"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@500;600&display=swap" rel="stylesheet"><script src="_measure.js"></script><style>.stage{padding:44px}.pill{margin-top:16px;background:var(--brand-50);border:1px solid var(--brand-100);border-radius:10px;padding:12px 15px;display:flex;justify-content:space-between;align-items:center}.pill .k{font-size:12.5px;color:var(--ink-600)}.pill .v{font-family:"Geist Mono",monospace;font-size:13px;font-weight:600;color:var(--brand)}.file{display:flex;align-items:center;gap:9px;height:40px;border:1px dashed var(--line-strong);border-radius:9px;padding:0 13px;font-size:13px;color:var(--ink-600)}</style></head><body>
