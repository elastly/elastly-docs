<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="_measure.js"></script>
<style>
  .stage { padding: 44px; }
  .wrap { display: flex; align-items: stretch; gap: 22px; }
  .col { width: 300px; background: var(--surface); border: 1px solid var(--line); border-radius: 20px; padding: 26px 26px 24px; }
  .col .cap { display: flex; align-items: center; gap: 9px; font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .col .sub { font-size: 13px; color: var(--ink-400); margin-bottom: 18px; }
  .ic { width: 30px; height: 30px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
  .ic svg { width: 17px; height: 17px; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .floor .ic { background: var(--brand-50); } .floor .ic svg { stroke: var(--brand); }
  .ceil .ic { background: #fdf2dc; } .ceil .ic svg { stroke: var(--gold-strong, #c77f10); }
  .item { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 14px; color: var(--ink-600); }
  .item .d { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .floor .d { background: var(--brand); } .ceil .d { background: var(--gold); }
  .item.win { color: var(--ink); font-weight: 600; }
  .pick { margin-top: 14px; font-size: 12.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }
  .floor .pick { color: var(--brand); } .ceil .pick { color: var(--gold-strong, #c77f10); }
  .band { width: 118px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; }
  .cap2 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-400); margin-bottom: 12px; text-align:center; }
  .rail { width: 12px; flex: 1; border-radius: 8px; background: linear-gradient(var(--gold) 0%, #eee 18%, #eee 82%, var(--brand) 100%); position: relative; min-height: 240px; }
  .tag { position: absolute; left: 22px; white-space: nowrap; font-size: 12px; color: var(--ink-600); font-family: "Geist Mono", ui-monospace, monospace; }
  .tag.top { top: -2px; } .tag.bot { bottom: -2px; }
  .allow { position:absolute; left: -46px; top: 50%; transform: translateY(-50%) rotate(-90deg); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-400); }
</style>
</head>
<body>
<div class="stage">
  <div class="wrap">
    <div class="col floor">
      <div class="cap"><span class="ic"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></span>Floor</div>
      <div class="sub">The highest of these wins</div>
      <div class="item win"><span class="d"></span>MAP compliance</div>
      <div class="item"><span class="d"></span>Price floor</div>
      <div class="item"><span class="d"></span>Competitor band, low</div>
      <div class="item"><span class="d"></span>Minimum margin</div>
      <div class="pick">Strictest floor holds</div>
    </div>
    <div class="band">
      <div class="cap2">Allowed range</div>
      <div class="rail">
        <span class="tag top">ceiling</span>
        <span class="tag bot">floor</span>
      </div>
    </div>
    <div class="col ceil">
      <div class="cap"><span class="ic"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg></span>Ceiling</div>
      <div class="sub">The lowest of these wins</div>
      <div class="item win"><span class="d"></span>Price ceiling</div>
      <div class="item"><span class="d"></span>Competitor band, high</div>
      <div class="item"><span class="d"></span>Maximum margin</div>
      <div class="item" style="visibility:hidden"><span class="d"></span>spacer</div>
      <div class="pick">Strictest ceiling holds</div>
    </div>
  </div>
</div>
</body>
</html>
